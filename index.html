<script>
// 全域錯誤監聽:任何錯誤都顯示出來
function showErr(title, detail) {
  var root = document.getElementById("root");
  if (root && document.getElementById("loadstatus")) {
    root.innerHTML = '<div style="color:#e8482b;font-family:monospace;padding:40px 20px;font-size:12px;white-space:pre-wrap;word-break:break-word;">' +
      title + '\n' + detail + '</div>';
  }
}
window.addEventListener("error", function (e) {
  var d = (e.message || "未知");
  if (e.error && e.error.stack) d += "\n\n" + e.error.stack;
  if (e.filename) d += "\n\n" + e.filename + (e.lineno ? " 第" + e.lineno + "行" : "");
  showErr("發生錯誤:", d);
});
window.addEventListener("unhandledrejection", function (e) {
  showErr("Promise 錯誤:", (e.reason && e.reason.message) ? e.reason.message : String(e.reason));
});

<script>
// ============================================================
// 動態產生 PWA manifest(讓加到主畫面有正確名稱/圖示/獨立視窗)
// ============================================================
const iconSvg = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgcng9IjIwIiBmaWxsPSIjMGUxMTE2Ii8+PHBhdGggZD0iTTIwIDcwIEwzNSA1MCBMNTAgNjAgTDgwIDMwIiBzdHJva2U9IiMxZmI4N2EiIHN0cm9rZS13aWR0aD0iNiIgZmlsbD0ibm9uZSIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIi8+PGNpcmNsZSBjeD0iODAiIGN5PSIzMCIgcj0iNiIgZmlsbD0iI2Q5YTQ0MSIvPjwvc3ZnPg==';
const manifest = {
  name: "交易檢討日誌", short_name: "交易日誌",
  start_url: ".", display: "standalone",
  background_color: "#0e1116", theme_color: "#0e1116",
  icons: [{ src: iconSvg, sizes: "any", type: "image/svg+xml" }],
};
const mBlob = new Blob([JSON.stringify(manifest)], { type: "application/json" });
document.getElementById("manifest-placeholder").setAttribute("href", URL.createObjectURL(mBlob));

// ============================================================
// IndexedDB 儲存層 — 資料永久存在手機本機,重整/關閉/重開機都不掉
// ============================================================
const DB_NAME = "tradeJournalDB";
const STORE = "trades";
const DB_VERSION = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE)) {
        db.createObjectStore(STORE, { keyPath: "id" });
      }
    };
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

async function dbGetAll() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readonly");
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

async function dbPut(trade) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).put(trade);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function dbDelete(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function dbBulkPut(trades) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readwrite");
    const store = tx.objectStore(STORE);
    trades.forEach((t) => store.put(t));
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function dbClear() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).clear();
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
</script>

<script type="text/plain" id="app-source">
const { useState, useMemo, useRef, useEffect } = React;

// ============================================================
// 顏色慣例:綠=賺 紅=賠 (對調只需互換下面兩個常數值)
// ============================================================
const PROFIT_COLOR = "#1fb87a";
const LOSS_COLOR = "#e8482b";
const profitBg = (a) => `rgba(31,184,122,${a})`;
const lossBg = (a) => `rgba(232,72,43,${a})`;
const ACCENT = "#d9a441";
const BG = "#0e1116";
const PANEL = "#161b22";
const PANEL2 = "#1c232c";
const BORDER = "#2a323d";
const TEXT = "#e6edf3";
const MUTED = "#7d8794";

const pnlColor = (v) => (v > 0 ? PROFIT_COLOR : v < 0 ? LOSS_COLOR : MUTED);
const fmtMoney = (v) =>
  (v >= 0 ? "+" : "−") + "US$" +
  Math.abs(v).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtR = (v) => (v >= 0 ? "+" : "−") + Math.abs(v).toFixed(2) + "R";

// ============================================================
// 純 SVG 圖表元件(不依賴任何圖表庫)
// ============================================================
const CHART_W = 320, CHART_H = 170, PAD_L = 38, PAD_R = 8, PAD_T = 10, PAD_B = 22;

// 計算 Y 軸範圍與刻度
function yScale(values, h) {
  let min = Math.min(0, ...values), max = Math.max(0, ...values);
  if (min === max) { max = max + 1; min = min - 1; }
  const range = max - min;
  const innerH = h - PAD_T - PAD_B;
  const toY = (v) => PAD_T + innerH * (1 - (v - min) / range);
  return { min, max, toY, zeroY: toY(0) };
}
function fmtAxis(v) {
  return Math.abs(v) >= 1000 ? (v / 1000).toFixed(1) + "k" : Math.round(v).toString();
}

// 互動 hook:回傳目前選中的資料點索引與事件處理
function useChartHover(dataLength, toIndexFromX) {
  const [active, setActive] = useState(null);
  const svgRef = useRef(null);
  const handle = (clientX) => {
    const svg = svgRef.current;
    if (!svg) return;
    const rect = svg.getBoundingClientRect();
    // 把螢幕 x 換算成 viewBox 座標
    const vbX = ((clientX - rect.left) / rect.width) * CHART_W;
    const idx = toIndexFromX(vbX);
    if (idx != null && idx >= 0 && idx < dataLength) setActive(idx);
  };
  const onTouchMove = (e) => { if (e.touches[0]) { handle(e.touches[0].clientX); } };
  const onTouchStart = (e) => { if (e.touches[0]) { handle(e.touches[0].clientX); } };
  const onMouseMove = (e) => handle(e.clientX);
  const clear = () => setActive(null);
  return { active, svgRef, bind: {
    onTouchStart, onTouchMove, onTouchEnd: clear,
    onMouseMove, onMouseLeave: clear,
    style: { touchAction: "pan-y" },
  }};
}

// 折線+漸層面積圖(每日淨累積)
function AreaLineChart({ data, color }) {
  if (!data.length) return <div style={{ textAlign: "center", color: MUTED, fontSize: 12, padding: "30px 0" }}>此區間沒有交易紀錄</div>;
  const vals = data.map((d) => d.cum);
  const { min, max, toY, zeroY } = yScale(vals, CHART_H);
  const innerW = CHART_W - PAD_L - PAD_R;
  const toX = (i) => PAD_L + (data.length === 1 ? innerW / 2 : innerW * i / (data.length - 1));
  const toIndexFromX = (vbX) => {
    if (data.length === 1) return 0;
    const i = Math.round((vbX - PAD_L) / (innerW / (data.length - 1)));
    return Math.max(0, Math.min(data.length - 1, i));
  };
  const { active, svgRef, bind } = useChartHover(data.length, toIndexFromX);
  const linePts = data.map((d, i) => `${toX(i)},${toY(d.cum)}`).join(" ");
  const lastPos = data[data.length - 1].cum >= 0;
  const areaFill = lastPos ? color.profit : color.loss;
  const areaPath = `M ${toX(0)},${zeroY} L ` + data.map((d, i) => `${toX(i)},${toY(d.cum)}`).join(" L ") + ` L ${toX(data.length - 1)},${zeroY} Z`;
  const ticks = [max, (max + min) / 2, min];
  const ad = active != null ? data[active] : null;
  return (
    <svg ref={svgRef} {...bind} viewBox={`0 0 ${CHART_W} ${CHART_H}`} style={{ width: "100%", height: "auto", touchAction: "pan-y" }}>
      {ticks.map((t, i) => (
        <g key={i}>
          <line x1={PAD_L} y1={toY(t)} x2={CHART_W - PAD_R} y2={toY(t)} stroke={BORDER} strokeWidth="0.5" strokeDasharray="2 2" />
          <text x={PAD_L - 4} y={toY(t) + 3} textAnchor="end" fontSize="8" fill={MUTED}>{fmtAxis(t)}</text>
        </g>
      ))}
      <line x1={PAD_L} y1={zeroY} x2={CHART_W - PAD_R} y2={zeroY} stroke={BORDER} strokeWidth="1" />
      <path d={areaPath} fill={areaFill} fillOpacity="0.18" />
      <polyline points={linePts} fill="none" stroke={ACCENT} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
      {data.map((d, i) => (
        <text key={i} x={toX(i)} y={CHART_H - 6} textAnchor="middle" fontSize="7" fill={MUTED} style={{ display: (i === 0 || i === data.length - 1 || i === Math.floor(data.length / 2)) ? "block" : "none" }}>{d.date.slice(5)}</text>
      ))}
      {ad && <ChartCursor x={toX(active)} y={toY(ad.cum)} label={ad.date.slice(5)} value={fmtMoney(ad.cum)} />}
    </svg>
  );
}

// 指示線 + 數值氣泡(三圖共用)
function ChartCursor({ x, y, label, value }) {
  const boxW = 78, boxH = 30;
  let bx = x - boxW / 2;
  if (bx < 2) bx = 2;
  if (bx + boxW > CHART_W - 2) bx = CHART_W - 2 - boxW;
  const by = 2;
  return (
    <g pointerEvents="none">
      <line x1={x} y1={PAD_T} x2={x} y2={CHART_H - PAD_B} stroke={ACCENT} strokeWidth="1" strokeDasharray="3 2" />
      <circle cx={x} cy={y} r="3.5" fill={ACCENT} stroke={BG} strokeWidth="1.5" />
      <rect x={bx} y={by} width={boxW} height={boxH} rx="4" fill={PANEL2} stroke={BORDER} strokeWidth="0.5" />
      <text x={bx + boxW / 2} y={by + 12} textAnchor="middle" fontSize="8" fill={MUTED}>{label}</text>
      <text x={bx + boxW / 2} y={by + 24} textAnchor="middle" fontSize="9" fontWeight="600" fill={TEXT}>{value}</text>
    </g>
  );
}

// 長條圖(每日淨損益)
function BarChartSVG({ data, color }) {
  if (!data.length) return <div style={{ textAlign: "center", color: MUTED, fontSize: 12, padding: "30px 0" }}>此區間沒有交易紀錄</div>;
  const vals = data.map((d) => d.daily);
  const { min, max, toY, zeroY } = yScale(vals, CHART_H);
  const innerW = CHART_W - PAD_L - PAD_R;
  const bw = Math.max(2, Math.min(18, innerW / data.length * 0.7));
  const toX = (i) => PAD_L + innerW * (i + 0.5) / data.length;
  const toIndexFromX = (vbX) => {
    const i = Math.floor((vbX - PAD_L) / (innerW / data.length));
    return Math.max(0, Math.min(data.length - 1, i));
  };
  const { active, svgRef, bind } = useChartHover(data.length, toIndexFromX);
  const ticks = [max, (max + min) / 2, min];
  const ad = active != null ? data[active] : null;
  return (
    <svg ref={svgRef} {...bind} viewBox={`0 0 ${CHART_W} ${CHART_H}`} style={{ width: "100%", height: "auto", touchAction: "pan-y" }}>
      {ticks.map((t, i) => (
        <g key={i}>
          <line x1={PAD_L} y1={toY(t)} x2={CHART_W - PAD_R} y2={toY(t)} stroke={BORDER} strokeWidth="0.5" strokeDasharray="2 2" />
          <text x={PAD_L - 4} y={toY(t) + 3} textAnchor="end" fontSize="8" fill={MUTED}>{fmtAxis(t)}</text>
        </g>
      ))}
      <line x1={PAD_L} y1={zeroY} x2={CHART_W - PAD_R} y2={zeroY} stroke={BORDER} strokeWidth="1" />
      {data.map((d, i) => {
        const y = toY(d.daily);
        const h = Math.abs(y - zeroY);
        return <rect key={i} x={toX(i) - bw / 2} y={Math.min(y, zeroY)} width={bw} height={Math.max(1, h)} rx="1" fill={d.daily >= 0 ? color.profit : color.loss} opacity={active != null && active !== i ? 0.4 : 1} />;
      })}
      {data.map((d, i) => (
        <text key={i} x={toX(i)} y={CHART_H - 6} textAnchor="middle" fontSize="7" fill={MUTED} style={{ display: (i === 0 || i === data.length - 1 || i === Math.floor(data.length / 2)) ? "block" : "none" }}>{d.date.slice(5)}</text>
      ))}
      {ad && <ChartCursor x={toX(active)} y={toY(ad.daily)} label={ad.date.slice(5)} value={fmtMoney(ad.daily)} />}
    </svg>
  );
}

// 散點圖(時段表現:X=0-24小時, Y=損益)
function ScatterChartSVG({ data, color }) {
  if (!data.length) return <div style={{ textAlign: "center", color: MUTED, fontSize: 12, padding: "20px 0" }}>新增交易時填寫「進場時間」即可在此顯示</div>;
  const vals = data.map((d) => d.pnl);
  const { min, max, toY, zeroY } = yScale(vals, CHART_H + 20);
  const innerW = CHART_W - PAD_L - PAD_R;
  const toX = (h) => PAD_L + innerW * h / 24;
  const ticks = [max, (max + min) / 2, min];
  const hourTicks = [0, 6, 12, 18, 24];
  const [active, setActive] = useState(null);
  const svgRef = useRef(null);
  const pick = (clientX, clientY) => {
    const svg = svgRef.current;
    if (!svg) return;
    const rect = svg.getBoundingClientRect();
    const vbX = ((clientX - rect.left) / rect.width) * CHART_W;
    const vbY = ((clientY - rect.top) / rect.height) * (CHART_H + 20);
    // 找最近的點
    let best = null, bestD = Infinity;
    data.forEach((d, i) => {
      const dx = toX(d.hour) - vbX, dy = toY(d.pnl) - vbY;
      const dist = dx * dx + dy * dy;
      if (dist < bestD) { bestD = dist; best = i; }
    });
    if (best != null && bestD < 400) setActive(best); // 限制點選範圍
  };
  const ad = active != null ? data[active] : null;
  return (
    <svg ref={svgRef}
      onTouchStart={(e) => e.touches[0] && pick(e.touches[0].clientX, e.touches[0].clientY)}
      onTouchMove={(e) => e.touches[0] && pick(e.touches[0].clientX, e.touches[0].clientY)}
      onTouchEnd={() => setActive(null)}
      onMouseMove={(e) => pick(e.clientX, e.clientY)}
      onMouseLeave={() => setActive(null)}
      viewBox={`0 0 ${CHART_W} ${CHART_H + 20}`} style={{ width: "100%", height: "auto", touchAction: "pan-y" }}>
      {ticks.map((t, i) => (
        <g key={i}>
          <line x1={PAD_L} y1={toY(t)} x2={CHART_W - PAD_R} y2={toY(t)} stroke={BORDER} strokeWidth="0.5" strokeDasharray="2 2" />
          <text x={PAD_L - 4} y={toY(t) + 3} textAnchor="end" fontSize="8" fill={MUTED}>{fmtAxis(t)}</text>
        </g>
      ))}
      <line x1={PAD_L} y1={zeroY} x2={CHART_W - PAD_R} y2={zeroY} stroke={BORDER} strokeWidth="1" />
      {data.map((d, i) => (
        <circle key={i} cx={toX(d.hour)} cy={toY(d.pnl)} r={active === i ? 5 : 3.5} fill={d.win ? color.profit : color.loss} fillOpacity={active != null && active !== i ? 0.3 : 0.65} stroke={active === i ? TEXT : "none"} strokeWidth="1" />
      ))}
      {hourTicks.map((h, i) => (
        <text key={i} x={toX(h)} y={CHART_H + 14} textAnchor="middle" fontSize="8" fill={MUTED}>{String(h).padStart(2, "0")}:00</text>
      ))}
      {ad && (() => {
        const hh = Math.floor(ad.hour), mm = Math.round((ad.hour - hh) * 60);
        const tstr = String(hh).padStart(2, "0") + ":" + String(mm).padStart(2, "0");
        const dstr = ad.date ? ad.date.slice(5) : "";
        return <ChartCursorXY x={toX(ad.hour)} y={toY(ad.pnl)} label={(ad.symbol ? ad.symbol + " " : "") + dstr + " " + tstr} value={fmtMoney(ad.pnl)} />;
      })()}
    </svg>
  );
}

// 散點圖用的氣泡(不畫垂直線,只在點旁顯示)
function ChartCursorXY({ x, y, label, value }) {
  const boxW = 122, boxH = 30;
  let bx = x - boxW / 2;
  if (bx < 2) bx = 2;
  if (bx + boxW > CHART_W - 2) bx = CHART_W - 2 - boxW;
  let by = y - boxH - 8;
  if (by < 2) by = y + 8;
  return (
    <g pointerEvents="none">
      <rect x={bx} y={by} width={boxW} height={boxH} rx="4" fill={PANEL2} stroke={BORDER} strokeWidth="0.5" />
      <text x={bx + boxW / 2} y={by + 12} textAnchor="middle" fontSize="7.5" fill={MUTED}>{label}</text>
      <text x={bx + boxW / 2} y={by + 24} textAnchor="middle" fontSize="9" fontWeight="600" fill={TEXT}>{value}</text>
    </g>
  );
}

// 把分鐘數格式化成易讀字串
function fmtDuration(mins) {
  if (mins < 1) return Math.round(mins * 60) + "秒";
  if (mins < 60) return Math.round(mins) + "分";
  const h = mins / 60;
  if (h < 24) return (h % 1 === 0 ? h : h.toFixed(1)) + "時";
  return (h / 24).toFixed(1) + "天";
}

// 持倉時長散點圖(X=持倉分鐘,對數刻度; Y=損益)
function DurationScatterSVG({ data, color }) {
  if (!data.length) return <div style={{ textAlign: "center", color: MUTED, fontSize: 12, padding: "20px 0" }}>填寫「進場時間」與「出場時間」即可在此顯示</div>;
  const vals = data.map((d) => d.pnl);
  const { min, max, toY, zeroY } = yScale(vals, CHART_H + 20);
  const innerW = CHART_W - PAD_L - PAD_R;
  // 對數刻度:依實際資料最長持倉自動調整上限
  const maxMins = Math.max(60, ...data.map((d) => d.mins)); // 至少到1時
  const LOG_MIN = Math.log10(0.05); // 下限固定 3 秒
  const LOG_MAX = Math.log10(Math.max(60, maxMins * 1.3));
  const toX = (mins) => {
    const lg = Math.log10(Math.max(0.05, mins));
    return PAD_L + innerW * Math.max(0, Math.min(1, (lg - LOG_MIN) / (LOG_MAX - LOG_MIN)));
  };
  const ticks = [max, (max + min) / 2, min];
  // X 軸刻度:只顯示落在範圍內的
  const allMarks = [{ m: 1, l: "1分" }, { m: 10, l: "10分" }, { m: 60, l: "1時" }, { m: 480, l: "8時" }, { m: 1440, l: "1天" }, { m: 10080, l: "7天" }, { m: 43200, l: "30天" }];
  const xMarks = allMarks.filter((mk) => mk.m <= Math.pow(10, LOG_MAX));
  const [active, setActive] = useState(null);
  const svgRef = useRef(null);
  const pick = (cx, cy) => {
    const svg = svgRef.current; if (!svg) return;
    const rect = svg.getBoundingClientRect();
    const vbX = ((cx - rect.left) / rect.width) * CHART_W;
    const vbY = ((cy - rect.top) / rect.height) * (CHART_H + 20);
    let best = null, bestD = Infinity;
    data.forEach((d, i) => {
      const dx = toX(d.mins) - vbX, dy = toY(d.pnl) - vbY, dist = dx * dx + dy * dy;
      if (dist < bestD) { bestD = dist; best = i; }
    });
    if (best != null && bestD < 400) setActive(best);
  };
  const ad = active != null ? data[active] : null;
  return (
    <svg ref={svgRef}
      onTouchStart={(e) => e.touches[0] && pick(e.touches[0].clientX, e.touches[0].clientY)}
      onTouchMove={(e) => e.touches[0] && pick(e.touches[0].clientX, e.touches[0].clientY)}
      onTouchEnd={() => setActive(null)}
      onMouseMove={(e) => pick(e.clientX, e.clientY)}
      onMouseLeave={() => setActive(null)}
      viewBox={`0 0 ${CHART_W} ${CHART_H + 20}`} style={{ width: "100%", height: "auto", touchAction: "pan-y" }}>
      {ticks.map((t, i) => (
        <g key={i}>
          <line x1={PAD_L} y1={toY(t)} x2={CHART_W - PAD_R} y2={toY(t)} stroke={BORDER} strokeWidth="0.5" strokeDasharray="2 2" />
          <text x={PAD_L - 4} y={toY(t) + 3} textAnchor="end" fontSize="8" fill={MUTED}>{fmtAxis(t)}</text>
        </g>
      ))}
      <line x1={PAD_L} y1={zeroY} x2={CHART_W - PAD_R} y2={zeroY} stroke={BORDER} strokeWidth="1" />
      {data.map((d, i) => (
        <circle key={i} cx={toX(d.mins)} cy={toY(d.pnl)} r={active === i ? 5 : 3.5} fill={d.win ? color.profit : color.loss} fillOpacity={active != null && active !== i ? 0.3 : 0.65} stroke={active === i ? TEXT : "none"} strokeWidth="1" />
      ))}
      {xMarks.map((mk, i) => (
        <text key={i} x={toX(mk.m)} y={CHART_H + 14} textAnchor="middle" fontSize="8" fill={MUTED}>{mk.l}</text>
      ))}
      {ad && <ChartCursorXY x={toX(ad.mins)} y={toY(ad.pnl)} label={(ad.symbol ? ad.symbol + " " : "") + "持倉" + fmtDuration(ad.mins)} value={fmtMoney(ad.pnl)} />}
    </svg>
  );
}

function TradeJournal() {
  const [trades, setTrades] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [dataMenu, setDataMenu] = useState(false);
  // 啟動時從 IndexedDB 載入。只有「從未初始化過」才灌入種子範例;
  // 一旦初始化過,即使使用者刪到剩 0 筆,也不會再自動補範例。
  useEffect(() => {
    (async () => {
      try {
        let data = await dbGetAll();
        let seededFlag = null;
        try { seededFlag = localStorage.getItem("tj_seeded"); } catch (e) {}
        if ((!data || data.length === 0) && !seededFlag) {
          // 真正的首次使用:灌種子並記下標記
          const seeded = seed();
          await dbBulkPut(seeded);
          try { localStorage.setItem("tj_seeded", "1"); } catch (e) {}
          data = seeded;
        }
        setTrades(data || []);
      } catch (e) {
        console.error("載入失敗", e);
      } finally {
        setLoaded(true);
      }
    })();
  }, []);
  const [tab, setTab] = useState("dashboard"); // dashboard | calendar | new
  const [curveScale, setCurveScale] = useState("history"); // day|week|year|history|custom
  const [customRange, setCustomRange] = useState({ from: "", to: "" });
  const [calMonth, setCalMonth] = useState(() => {
    const t = new Date();
    return { y: t.getFullYear(), m: t.getMonth() };
  });
  const [selectedDay, setSelectedDay] = useState(null);
  const [lightbox, setLightbox] = useState(null); // 放大檢視的圖片 src
  const [editing, setEditing] = useState(null);    // 正在編輯的交易物件

  // ---------- 統計 ----------
  const stats = useMemo(() => {
    const closed = trades.filter((t) => typeof t.pnl === "number");
    const n = closed.length;
    const wins = closed.filter((t) => t.pnl > 0);
    const losses = closed.filter((t) => t.pnl < 0);
    const grossWin = wins.reduce((s, t) => s + t.pnl, 0);
    const grossLoss = Math.abs(losses.reduce((s, t) => s + t.pnl, 0));
    const winRate = n ? (wins.length / n) * 100 : 0;
    const avgWin = wins.length ? grossWin / wins.length : 0;
    const avgLoss = losses.length ? grossLoss / losses.length : 0;
    const pf = grossLoss ? grossWin / grossLoss : grossWin > 0 ? Infinity : 0;
    const totalPnl = closed.reduce((s, t) => s + t.pnl, 0);
    // 期望值(以 R 計):平均每筆 R
    const avgR = n ? closed.reduce((s, t) => s + (t.rMultiple || 0), 0) / n : 0;
    const expectancyMoney = n ? totalPnl / n : 0;
    return { n, winRate, pf, avgWin, avgLoss, totalPnl, avgR, expectancyMoney, wins: wins.length, losses: losses.length };
  }, [trades]);

  // ---------- 共用:依目前時間範圍判斷某日期是否落在範圍內 ----------
  const inScope = useMemo(() => {
    if (curveScale === "history") return () => true;
    if (curveScale === "custom") {
      const from = customRange.from || "0000-00-00";
      const to = customRange.to || "9999-99-99";
      return (date) => date >= from && date <= to;
    }
    const now = new Date();
    const cutoff = new Date(now);
    if (curveScale === "day") cutoff.setDate(now.getDate() - 1);
    if (curveScale === "week") cutoff.setDate(now.getDate() - 7);
    if (curveScale === "year") cutoff.setFullYear(now.getFullYear() - 1);
    const cut = cutoff.toISOString().slice(0, 10);
    return (date) => date >= cut;
  }, [curveScale, customRange]);

  // ---------- 權益曲線 ----------
  const equityData = useMemo(() => {
    const sorted = [...trades]
      .filter((t) => typeof t.pnl === "number" && inScope(t.date))
      .sort((a, b) => a.date.localeCompare(b.date));
    let cum = 0;
    return sorted.map((t) => {
      cum += t.pnl;
      return { date: t.date, equity: cum, pnl: t.pnl };
    });
  }, [trades, inScope]);

  // ---------- 時間範圍篩選後的交易(供新圖表共用) ----------
  const scopedTrades = useMemo(() => {
    return trades.filter((t) => typeof t.pnl === "number" && inScope(t.date));
  }, [trades, inScope]);

  // ---------- 每日淨損益(長條)與每日淨累積(漸層面積) ----------
  const dailyData = useMemo(() => {
    const byDay = {};
    scopedTrades.forEach((t) => {
      byDay[t.date] = (byDay[t.date] || 0) + t.pnl;
    });
    const days = Object.keys(byDay).sort();
    let cum = 0;
    return days.map((d) => {
      cum += byDay[d];
      return { date: d, daily: Math.round(byDay[d] * 100) / 100, cum: Math.round(cum * 100) / 100 };
    });
  }, [scopedTrades]);

  // ---------- 時段表現散點(依進場時間 0-24 小時) ----------
  const timeScatter = useMemo(() => {
    return scopedTrades
      .filter((t) => typeof t.pnl === "number" && t.time && /^\d{1,2}:\d{2}$/.test(t.time))
      .map((t) => {
        const [h, m] = t.time.split(":").map(Number);
        return { hour: h + m / 60, pnl: t.pnl, symbol: t.symbol, date: t.date, win: t.pnl >= 0 };
      });
  }, [scopedTrades]);

  // ---------- 持倉時長散點(出場日期時間 − 進場日期時間, 單位分鐘) ----------
  const durationScatter = useMemo(() => {
    const re = /^\d{1,2}:\d{2}$/;
    // 把日期(YYYY-MM-DD)+時間(HH:MM)組成 Date 物件
    const toDate = (dateStr, timeStr) => {
      const [y, mo, d] = dateStr.split("-").map(Number);
      const [h, mi] = timeStr.split(":").map(Number);
      return new Date(y, (mo || 1) - 1, d || 1, h, mi);
    };
    return scopedTrades
      .filter((t) => typeof t.pnl === "number" && t.date && t.time && t.exitTime && re.test(t.time) && re.test(t.exitTime))
      .map((t) => {
        const entryDt = toDate(t.date, t.time);
        // 出場日期留空 → 用進場當天
        const exitDateStr = t.exitDate && /^\d{4}-\d{1,2}-\d{1,2}$/.test(t.exitDate) ? t.exitDate : t.date;
        let exitDt = toDate(exitDateStr, t.exitTime);
        let mins = (exitDt - entryDt) / 60000;
        // 若沒填出場日期且結果為負(跨午夜當沖),自動補一天
        if (mins < 0 && !t.exitDate) mins += 24 * 60;
        if (mins < 0) mins = 0;
        return { mins, pnl: t.pnl, symbol: t.symbol, date: t.date, time: t.time, exitTime: t.exitTime, win: t.pnl >= 0 };
      });
  }, [scopedTrades]);
  const periodPnl = useMemo(() => {
    const now = new Date();
    const weekStart = new Date(now);
    weekStart.setDate(now.getDate() - now.getDay()); // 週日起算
    const ws = weekStart.toISOString().slice(0, 10);
    const monStr = `${calMonth.y}-${String(calMonth.m + 1).padStart(2, "0")}`;
    let week = 0, month = 0;
    trades.forEach((t) => {
      if (typeof t.pnl !== "number") return;
      if (t.date >= ws) week += t.pnl;
      if (t.date.startsWith(monStr)) month += t.pnl;
    });
    return { week, month };
  }, [trades, calMonth]);

  // ---------- 月曆 ----------
  const calendar = useMemo(() => {
    const { y, m } = calMonth;
    const first = new Date(y, m, 1);

  const dayTrades = useMemo(() => {

function StatCard({ label, value, sub, color }) {
  return (
    <div style={{ background: PANEL, border: `1px solid ${BORDER}`, borderRadius: 10, padding: "12px 14px" }}>
      <div style={{ fontSize: 10, letterSpacing: 1, color: MUTED, textTransform: "uppercase" }}>{label}</div>
      <div className="mono" style={{ fontSize: 22, fontWeight: 600, color: color || TEXT, marginTop: 4 }}>{value}</div>
      {sub && <div className="mono" style={{ fontSize: 11, color: MUTED, marginTop: 2 }}>{sub}</div>}
    </div>
  );
}

          <span style={{ fontSize: 10, padding: "2px 6px", borderRadius: 4, background: t.dir === "多" ? profitBg(0.15) : lossBg(0.15), color: t.dir === "多" ? PROFIT_COLOR : LOSS_COLOR, fontWeight: 600 }}>{t.dir}</span>
          <span style={{ fontWeight: 600, fontSize: 14 }}>{t.symbol}</span>

function Calendar({ calMonth, setCalMonth, calendar, periodPnl, selectedDay, setSelectedDay, dayTrades, onImgClick, onEdit }) {
  const nav = (delta) => {
    setSelectedDay(null);
    let { y, m } = calMonth;
    m += delta;
    if (m < 0) { m = 11; y -= 1; }
    if (m > 11) { m = 0; y += 1; }
    setCalMonth({ y, m });
  };
  const weekdays = ["日","一","二","三","四","五","六"];
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <button onClick={() => nav(-1)} className="mono" style={{ background: PANEL2, color: TEXT, padding: "6px 12px", borderRadius: 6, border: `1px solid ${BORDER}` }}>‹</button>
        <div style={{ textAlign: "center" }}>
          <div className="mono" style={{ fontSize: 16, fontWeight: 600 }}>{calMonth.y}年 {calMonth.m + 1}月</div>
          <div className="mono" style={{ fontSize: 12, color: pnlColor(periodPnl.month) }}>本月 {fmtMoney(periodPnl.month)}</div>
        </div>
        <button onClick={() => nav(1)} className="mono" style={{ background: PANEL2, color: TEXT, padding: "6px 12px", borderRadius: 6, border: `1px solid ${BORDER}` }}>›</button>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 4 }}>
        {weekdays.map((w) => <div key={w} style={{ textAlign: "center", fontSize: 11, color: MUTED, padding: "2px 0" }}>{w}</div>)}
        {calendar.map((c, i) => {
          if (!c) return <div key={i} />;
          const has = c.count > 0;
          const sel = selectedDay === c.d;
          return (
            <button key={i} onClick={() => setSelectedDay(has ? c.d : null)} style={{
              aspectRatio: "1", borderRadius: 8, padding: 3, display: "flex", flexDirection: "column",
              justifyContent: "space-between", alignItems: "stretch",
              background: has ? (c.pnl > 0 ? profitBg(0.13) : lossBg(0.13)) : PANEL,
              border: sel ? `1.5px solid ${ACCENT}` : `1px solid ${has ? (c.pnl > 0 ? profitBg(0.4) : lossBg(0.4)) : BORDER}`,
            }}>
              <span className="mono" style={{ fontSize: 11, color: MUTED, textAlign: "left" }}>{c.d}</span>
              {has && <>
                <span className="mono" style={{ fontSize: 11, fontWeight: 600, color: pnlColor(c.pnl) }}>{(c.pnl >= 0 ? "+" : "−") + Math.abs(Math.round(c.pnl)).toLocaleString()}</span>
                <span className="mono" style={{ fontSize: 9, color: MUTED, textAlign: "right" }}>{c.count}筆</span>
              </>}
            </button>
          );
        })}
      </div>

      {selectedDay && (
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          <div style={{ fontSize: 13, fontWeight: 600 }}>{calMonth.m + 1}/{selectedDay} 當日交易</div>
          {dayTrades.map((t) => <TradeRow key={t.id} t={t} onImgClick={onImgClick} onEdit={onEdit} />)}
        </div>
      )}
    </div>
  );
}

function NewTrade({ onAdd, editing, onUpdate, onDelete, onCancel }) {
  const isEdit = !!editing;
  const blank = {
    date: new Date().toISOString().slice(0, 10), time: "", exitDate: "", exitTime: "", symbol: "", dir: "多", strategy: "",
    entry: "", sl: "", tp: "", exit: "", qty: "", pointValue: "", fee: "",
    reason: "", review: "", imgs: [],
  };
  // 編輯時把數字轉回字串填回表單
  const [f, setF] = useState(() => {
    if (!editing) return blank;
    const toStr = (v) => (v == null ? "" : String(v));
    return {
      date: editing.date, time: editing.time || "", exitDate: editing.exitDate || "", exitTime: editing.exitTime || "", symbol: editing.symbol || "", dir: editing.dir || "多",
      strategy: editing.strategy || "", entry: toStr(editing.entry), sl: toStr(editing.sl),
      tp: toStr(editing.tp), exit: toStr(editing.exit), qty: toStr(editing.qty),
      pointValue: toStr(editing.pointValue), fee: toStr(editing.fee),
      reason: editing.reason || "", review: editing.review || "", imgs: editing.imgs || [],
    };
  });
  const fileRef = useRef();
  const set = (k, v) => setF((p) => ({ ...p, [k]: v }));

  const onImg = (e) => {
    const files = Array.from(e.target.files);
    files.forEach((file) => {
      const reader = new FileReader();
      reader.onload = () => setF((p) => ({ ...p, imgs: [...p.imgs, reader.result] }));
      reader.readAsDataURL(file);
    });
    e.target.value = "";
  };
  const removeImg = (i) => setF((p) => ({ ...p, imgs: p.imgs.filter((_, idx) => idx !== i) }));

  const entry = parseFloat(f.entry), sl = parseFloat(f.sl), exit = parseFloat(f.exit);
  const qty = parseFloat(f.qty), pv = parseFloat(f.pointValue), fee = parseFloat(f.fee) || 0;
  const dir = f.dir === "多" ? 1 : -1;

  // 損益 =(出場 − 進場)× 方向 × 口數 × 點值 − 手續費
  const pnl = useMemo(() => {
    if ([entry, exit, qty, pv].some(isNaN)) return null;
    return (exit - entry) * dir * qty * pv - fee;
  }, [entry, exit, qty, pv, fee, dir]);

  // 風險額 =|進場 − 停損|× 口數 × 點值
  const risk = useMemo(() => {
    if ([entry, sl, qty, pv].some(isNaN)) return null;
    return Math.abs(entry - sl) * qty * pv;
  }, [entry, sl, qty, pv]);

  const rMultiple = useMemo(() => {
    if (pnl == null || risk == null || risk === 0) return null;
    return pnl / risk;
  }, [pnl, risk]);

  const submit = () => {
    if (!f.symbol) { alert("請輸入商品"); return; }
    const hasPnl = pnl != null;
    const payload = {
      ...f,
      entry: entry || null, sl: sl || null, tp: parseFloat(f.tp) || null, exit: exit || null,
      qty: qty || null, pointValue: pv || null, fee,
      risk: risk ?? null,
      pnl: hasPnl ? Math.round(pnl * 100) / 100 : null,
      rMultiple: rMultiple ?? null,
      open: !hasPnl, // 未平倉標記
    };
    if (isEdit) onUpdate({ ...payload, id: editing.id });
    else onAdd(payload);
  };

  const inp = { width: "100%", background: PANEL2, border: `1px solid ${BORDER}`, borderRadius: 8, color: TEXT, padding: "10px 12px", fontSize: 14, marginTop: 4 };
  const lbl = { fontSize: 11, color: MUTED, letterSpacing: 0.5 };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr", gap: 10 }}>
        <div style={{ minWidth: 0 }}><div style={lbl}>日期</div>
          <input type="text" inputMode="text" placeholder="2026-06-26" value={f.date} onChange={(e) => set("date", e.target.value)} style={inp} /></div>
        <div style={{ minWidth: 0 }}><div style={lbl}>方向</div>
          <select value={f.dir} onChange={(e) => set("dir", e.target.value)} style={inp}><option>多</option><option>空</option></select>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        <div style={{ minWidth: 0 }}><div style={lbl}>進場時間</div>
          <input type="text" inputMode="text" placeholder="21:30" value={f.time} onChange={(e) => set("time", e.target.value)} style={inp} /></div>
        <div style={{ minWidth: 0 }}><div style={lbl}>出場時間</div>
          <input type="text" inputMode="text" placeholder="22:15" value={f.exitTime} onChange={(e) => set("exitTime", e.target.value)} style={inp} /></div>
      </div>
      <div>
        <div style={lbl}>出場日期(當沖可留空,跨日波段才填)</div>
        <input type="text" inputMode="text" placeholder="2026-07-10" value={f.exitDate} onChange={(e) => set("exitDate", e.target.value)} style={inp} />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        <div style={{ minWidth: 0 }}><div style={lbl}>商品</div><input placeholder="XAUUSD / MNQ" value={f.symbol} onChange={(e) => set("symbol", e.target.value)} style={inp} /></div>
        <div style={{ minWidth: 0 }}><div style={lbl}>策略</div><input placeholder="SNR / ICT" value={f.strategy} onChange={(e) => set("strategy", e.target.value)} style={inp} /></div>
        <div style={{ minWidth: 0 }}><div style={lbl}>口數</div><input type="number" inputMode="decimal" value={f.qty} onChange={(e) => set("qty", e.target.value)} style={inp} /></div>
        <div style={{ minWidth: 0 }}><div style={lbl}>點值 (每點/口)</div><input type="number" inputMode="decimal" value={f.pointValue} onChange={(e) => set("pointValue", e.target.value)} style={inp} /></div>
        <div style={{ minWidth: 0 }}><div style={lbl}>進場價</div><input type="number" inputMode="decimal" value={f.entry} onChange={(e) => set("entry", e.target.value)} style={inp} /></div>
        <div style={{ minWidth: 0 }}><div style={lbl}>出場價</div><input type="number" inputMode="decimal" value={f.exit} onChange={(e) => set("exit", e.target.value)} style={inp} /></div>
        <div style={{ minWidth: 0 }}><div style={lbl}>停損價</div><input type="number" inputMode="decimal" value={f.sl} onChange={(e) => set("sl", e.target.value)} style={inp} /></div>
        <div style={{ minWidth: 0 }}><div style={lbl}>停利價 (TP)</div><input type="number" inputMode="decimal" value={f.tp} onChange={(e) => set("tp", e.target.value)} style={inp} /></div>
        <div style={{ minWidth: 0 }}><div style={lbl}>手續費 (總額)</div><input type="number" inputMode="decimal" value={f.fee} onChange={(e) => set("fee", e.target.value)} style={inp} /></div>
      </div>

      {/* 自動計算結果 */}
      <div style={{ background: PANEL, borderRadius: 10, border: `1px solid ${BORDER}`, padding: "12px 14px", display: "flex", justifyContent: "space-around", textAlign: "center" }}>
        <div>
          <div style={{ fontSize: 10, color: MUTED, letterSpacing: 1 }}>損益</div>
          <div className="mono" style={{ fontSize: 18, fontWeight: 600, color: pnl == null ? MUTED : pnlColor(pnl), marginTop: 2 }}>{pnl == null ? "—" : fmtMoney(pnl)}</div>
        </div>
        <div style={{ width: 1, background: BORDER }} />
        <div>
          <div style={{ fontSize: 10, color: MUTED, letterSpacing: 1 }}>風險額</div>
          <div className="mono" style={{ fontSize: 18, fontWeight: 600, marginTop: 2 }}>{risk == null ? "—" : "US$" + risk.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
        </div>
        <div style={{ width: 1, background: BORDER }} />
        <div>
          <div style={{ fontSize: 10, color: MUTED, letterSpacing: 1 }}>實際 R</div>
          <div className="mono" style={{ fontSize: 18, fontWeight: 600, color: rMultiple == null ? MUTED : pnlColor(rMultiple), marginTop: 2 }}>{rMultiple == null ? "—" : fmtR(rMultiple)}</div>
        </div>
      </div>

      <div><div style={lbl}>進場理由</div>
        <textarea rows={2} placeholder="為什麼進場?符合哪些 setup 條件?" value={f.reason} onChange={(e) => set("reason", e.target.value)} style={{ ...inp, resize: "vertical" }} /></div>
      <div><div style={lbl}>檢討</div>
        <textarea rows={3} placeholder="執行得如何?有沒有違反規則?下次改什麼?" value={f.review} onChange={(e) => set("review", e.target.value)} style={{ ...inp, resize: "vertical" }} /></div>

      <div>
        <div style={lbl}>截圖(可多張:進場前 / 進場 / 出場復盤)</div>
        <button onClick={() => fileRef.current.click()} style={{ width: "100%", background: PANEL2, color: MUTED, border: `1px dashed ${BORDER}`, borderRadius: 8, padding: "14px", fontSize: 13, marginTop: 4 }}>
          ＋ 上傳截圖(可一次選多張)
        </button>
        <input ref={fileRef} type="file" accept="image/*" multiple onChange={onImg} style={{ display: "none" }} />
        {f.imgs.length > 0 && (
          <div style={{ display: "flex", gap: 8, overflowX: "auto", marginTop: 8, paddingBottom: 6 }}>
            {f.imgs.map((src, i) => (
              <div key={i} style={{ position: "relative", flexShrink: 0 }}>
                <img src={src} alt={"preview" + i} style={{ height: 120, borderRadius: 8, border: `1px solid ${BORDER}` }} />
                <button onClick={() => removeImg(i)} style={{ position: "absolute", top: 4, right: 4, background: "rgba(0,0,0,0.7)", color: "#fff", borderRadius: "50%", width: 22, height: 22, fontSize: 14, lineHeight: "20px" }}>×</button>
              </div>
            ))}
          </div>
        )}
      </div>

      <button onClick={submit} style={{ background: ACCENT, color: "#000", fontWeight: 600, fontSize: 15, padding: "14px", borderRadius: 10, marginTop: 4 }}>{isEdit ? "更新交易" : "儲存交易"}</button>
      {isEdit && (
        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={onCancel} style={{ flex: 1, background: PANEL2, color: TEXT, fontWeight: 600, fontSize: 14, padding: "12px", borderRadius: 10, border: `1px solid ${BORDER}` }}>取消</button>
          <button onClick={() => { if (confirm("確定刪除這筆交易?")) onDelete(editing.id); }} style={{ flex: 1, background: "transparent", color: LOSS_COLOR, fontWeight: 600, fontSize: 14, padding: "12px", borderRadius: 10, border: `1px solid ${LOSS_COLOR}` }}>刪除</button>
        </div>
      )}
    </div>
  );
}

// ============================================================
// 掛載
// ============================================================
const rootEl = document.getElementById("root");
if (window.__loadTimeout) clearTimeout(window.__loadTimeout);
try {
  ReactDOM.createRoot(rootEl).render(<TradeJournal />);
} catch (err) {
  rootEl.innerHTML = '<div style="color:#e8482b;font-family:monospace;padding:40px 20px;font-size:13px;white-space:pre-wrap;">渲染錯誤:\n' + (err && err.message ? err.message : String(err)) + '</div>';
}

</script>
<script>
// 等所有外部元件就緒後,手動編譯 app 原始碼(可精準捕捉編譯錯誤)
(function () {
  function ready() {
    var l = window.__libsLoaded;
    return l.react && l.dom && l.babel && window.Babel;
  }
  function run() {
    try {
      var src = document.getElementById("app-source").textContent;
      var compiled = Babel.transform(src, {
        presets: [["react", { runtime: "classic" }]],
        sourceType: "script",
      }).code;
      // 暴力清除任何殘留的 import/export 語句(瀏覽器執行不支援)
      compiled = compiled
        .replace(/^\s*import\s+.*?;?\s*$/gm, "")
        .replace(/^\s*export\s+default\s+/gm, "")
        .replace(/^\s*export\s+\{[^}]*\}\s*;?\s*$/gm, "")
        .replace(/^\s*export\s+/gm, "")
        .replace(/"use strict";/g, "");
      if (window.__loadTimeout) clearTimeout(window.__loadTimeout);
      // require shim:萬一 babel 產生 require(...),導向全域物件
      var requireShim = function (name) {
        if (name === "react") return window.React;
        if (name === "react-dom" || name === "react-dom/client") return window.ReactDOM;
        return {};
      };
      var wrapped = "(function(require, exports, module){\n" + compiled + "\n})";
      (new Function("return " + wrapped)())(requireShim, {}, { exports: {} });
    } catch (err) {
      var root = document.getElementById("root");
      root.innerHTML = '<div style="color:#e8482b;font-family:monospace;padding:40px 20px;font-size:12px;white-space:pre-wrap;word-break:break-word;">編譯/執行錯誤:\n' +
        (err && err.message ? err.message : String(err)) +
        (err && err.stack ? '\n\n' + err.stack : '') + '</div>';
    }
  }
  var tries = 0;
  var iv = setInterval(function () {
    tries++;
    if (ready()) { clearInterval(iv); run(); }
    else if (tries > 150) { clearInterval(iv); } // 30秒放棄,交給逾時畫面
  }, 200);
})();
</script>
</body>
