<script>

const iconSvg = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgcng9IjIwIiBmaWxsPSIjMGUxMTE2Ii8+PHBhdGggZD0iTTIwIDcwIEwzNSA1MCBMNTAgNjAgTDgwIDMwIiBzdHJva2U9IiMxZmI4N2EiIHN0cm9rZS13aWR0aD0iNiIgZmlsbD0ibm9uZSIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIi8+PGNpcmNsZSBjeD0iODAiIGN5PSIzMCIgcj0iNiIgZmlsbD0iI2Q5YTQ0MSIvPjwvc3ZnPg==';
const manifest = {
  name: "交易檢討日誌", short_name: "交易日誌",
  start_url: ".", display: "standalone",
  background_color: "#0e1116", theme_color: "#0e1116",
  icons: [{ src: iconSvg, sizes: "any", type: "image/svg+xml" }],
};
const mBlob = new Blob([JSON.stringify(manifest)], { type: "application/json" });
document.getElementById("manifest-placeholder").setAttribute("href", URL.createObjectURL(mBlob));

// ============================================================
// IndexedDB 儲存層 — 資料永久存在手機本機,重整/關閉/重開機都不掉
// ============================================================
const DB_NAME = "tradeJournalDB";
const STORE = "trades";
const DB_VERSION = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE)) {
        db.createObjectStore(STORE, { keyPath: "id" });
      }
    };
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

async function dbGetAll() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readonly");
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

async function dbPut(trade) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).put(trade);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function dbDelete(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function dbBulkPut(trades) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readwrite");
    const store = tx.objectStore(STORE);
    trades.forEach((t) => store.put(t));
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
</script>

export default function TradeJournal() {

  useEffect(() => {

    const n = closed.length;
    const wins = closed.filter((t) => t.pnl > 0);
    const losses = closed.filter((t) => t.pnl < 0);
    const grossWin = wins.reduce((s, t) => s + t.pnl, 0);
    const grossLoss = Math.abs(losses.reduce((s, t) => s + t.pnl, 0));
    const winRate = n ? (wins.length / n) * 100 : 0;
    const avgWin = wins.length ? grossWin / wins.length : 0;
    const avgLoss = losses.length ? grossLoss / losses.length : 0;
    const pf = grossLoss ? grossWin / grossLoss : grossWin > 0 ? Infinity : 0;
    const totalPnl = closed.reduce((s, t) => s + t.pnl, 0);
    // 期望值(以 R 計):平均每筆 R
    const avgR = n ? closed.reduce((s, t) => s + (t.rMultiple || 0), 0) / n : 0;
    const expectancyMoney = n ? totalPnl / n : 0;
    return { n, winRate, pf, avgWin, avgLoss, totalPnl, avgR, expectancyMoney, wins: wins.length, losses: losses.length };

      const to = customRange.to || "9999-99-99";

  }, [curveScale, customRange]);

    const sorted = [...trades]

    let cum = 0;
    return sorted.map((t) => {

  // ---------- 時間範圍篩選後的交易(供新圖表共用) ----------
  const scopedTrades = useMemo(() => {
    return trades.filter((t) => typeof t.pnl === "number" && inScope(t.date));

function NewTrade({ onAdd, editing, onUpdate, onDelete, onCancel }) {
const isEdit = !!editing;
const blank = {
date: new Date().toISOString().slice(0, 10), time: “”, symbol: “”, dir: “多”, strategy: “”,
entry: “”, sl: “”, tp: “”, exit: “”, qty: “”, pointValue: “”, fee: “”,
reason: “”, review: “”, imgs: [],
};
// 編輯時把數字轉回字串填回表單
const [f, setF] = useState(() => {
if (!editing) return blank;
const toStr = (v) => (v == null ? “” : String(v));
return {
date: editing.date, time: editing.time || “”, symbol: editing.symbol || “”, dir: editing.dir || “多”,
strategy: editing.strategy || “”, entry: toStr(editing.entry), sl: toStr(editing.sl),
tp: toStr(editing.tp), exit: toStr(editing.exit), qty: toStr(editing.qty),
pointValue: toStr(editing.pointValue), fee: toStr(editing.fee),
reason: editing.reason || “”, review: editing.review || “”, imgs: editing.imgs || [],
};
});
const fileRef = useRef();
const set = (k, v) => setF((p) => ({ …p, [k]: v }));

const onImg = (e) => {
const files = Array.from(e.target.files);
files.forEach((file) => {
const reader = new FileReader();
reader.onload = () => setF((p) => ({ …p, imgs: […p.imgs, reader.result] }));
reader.readAsDataURL(file);
});
e.target.value = “”;
};
const removeImg = (i) => setF((p) => ({ …p, imgs: p.imgs.filter((_, idx) => idx !== i) }));

const entry = parseFloat(f.entry), sl = parseFloat(f.sl), exit = parseFloat(f.exit);
const qty = parseFloat(f.qty), pv = parseFloat(f.pointValue), fee = parseFloat(f.fee) || 0;
const dir = f.dir === “多” ? 1 : -1;

// 損益 =(出場 − 進場)× 方向 × 口數 × 點值 − 手續費
const pnl = useMemo(() => {
if ([entry, exit, qty, pv].some(isNaN)) return null;
return (exit - entry) * dir * qty * pv - fee;
}, [entry, exit, qty, pv, fee, dir]);

// 風險額 =|進場 − 停損|× 口數 × 點值
const risk = useMemo(() => {
if ([entry, sl, qty, pv].some(isNaN)) return null;
return Math.abs(entry - sl) * qty * pv;
}, [entry, sl, qty, pv]);

const rMultiple = useMemo(() => {
if (pnl == null || risk == null || risk === 0) return null;
return pnl / risk;
}, [pnl, risk]);

const submit = () => {
if (!f.symbol) { alert(“請輸入商品”); return; }
if (pnl == null) { alert(“請填進場、出場、口數、點值,才能算損益”); return; }
const payload = {

qty: qty || null, pointValue: pv || null, fee,
risk: risk ?? null, pnl: Math.round(pnl * 100) / 100, rMultiple: rMultiple ?? 0,
};
if (isEdit) onUpdate({ …payload, id: editing.id });
else onAdd(payload);
};

  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
    <div style={{ minWidth: 0 }}><div style={lbl}>商品</div><input placeholder="XAUUSD / MNQ" value={f.symbol} onChange={(e) => set("symbol", e.target.value)} style={inp} /></div>
    <div style={{ minWidth: 0 }}><div style={lbl}>策略</div><input placeholder="SNR / ICT" value={f.strategy} onChange={(e) => set("strategy", e.target.value)} style={inp} /></div>
    <div style={{ minWidth: 0 }}><div style={lbl}>口數</div><input type="number" inputMode="decimal" value={f.qty} onChange={(e) => set("qty", e.target.value)} style={inp} /></div>
    <div style={{ minWidth: 0 }}><div style={lbl}>點值 (每點/口)</div><input type="number" inputMode="decimal" value={f.pointValue} onChange={(e) => set("pointValue", e.target.value)} style={inp} /></div>
    <div style={{ minWidth: 0 }}><div style={lbl}>進場價</div><input type="number" inputMode="decimal" value={f.entry} onChange={(e) => set("entry", e.target.value)} style={inp} /></div>
    <div style={{ minWidth: 0 }}><div style={lbl}>出場價</div><input type="number" inputMode="decimal" value={f.exit} onChange={(e) => set("exit", e.target.value)} style={inp} /></div>
    <div style={{ minWidth: 0 }}><div style={lbl}>停損價</div><input type="number" inputMode="decimal" value={f.sl} onChange={(e) => set("sl", e.target.value)} style={inp} /></div>
    <div style={{ minWidth: 0 }}><div style={lbl}>停利價 (TP)</div><input type="number" inputMode="decimal" value={f.tp} onChange={(e) => set("tp", e.target.value)} style={inp} /></div>
    <div style={{ minWidth: 0 }}><div style={lbl}>手續費 (總額)</div><input type="number" inputMode="decimal" value={f.fee} onChange={(e) => set("fee", e.target.value)} style={inp} /></div>
  </div>

  {/* 自動計算結果 */}
  <div style={{ background: PANEL, borderRadius: 10, border: `1px solid ${BORDER}`, padding: "12px 14px", display: "flex", justifyContent: "space-around", textAlign: "center" }}>
    <div>
      <div style={{ fontSize: 10, color: MUTED, letterSpacing: 1 }}>損益</div>
      <div className="mono" style={{ fontSize: 18, fontWeight: 600, color: pnl == null ? MUTED : pnlColor(pnl), marginTop: 2 }}>{pnl == null ? "—" : fmtMoney(pnl)}</div>
    </div>
    <div style={{ width: 1, background: BORDER }} />
    <div>
      <div style={{ fontSize: 10, color: MUTED, letterSpacing: 1 }}>風險額</div>
      <div className="mono" style={{ fontSize: 18, fontWeight: 600, marginTop: 2 }}>{risk == null ? "—" : "US$" + risk.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
    </div>
    <div style={{ width: 1, background: BORDER }} />
    <div>
      <div style={{ fontSize: 10, color: MUTED, letterSpacing: 1 }}>實際 R</div>
      <div className="mono" style={{ fontSize: 18, fontWeight: 600, color: rMultiple == null ? MUTED : pnlColor(rMultiple), marginTop: 2 }}>{rMultiple == null ? "—" : fmtR(rMultiple)}</div>
    </div>
  </div>

  <div><div style={lbl}>進場理由</div>
    <textarea rows={2} placeholder="為什麼進場?符合哪些 setup 條件?" value={f.reason} onChange={(e) => set("reason", e.target.value)} style={{ ...inp, resize: "vertical" }} /></div>
  <div><div style={lbl}>檢討</div>
    <textarea rows={3} placeholder="執行得如何?有沒有違反規則?下次改什麼?" value={f.review} onChange={(e) => set("review", e.target.value)} style={{ ...inp, resize: "vertical" }} /></div>

  <div>
    <div style={lbl}>截圖(可多張:進場前 / 進場 / 出場復盤)</div>
    <button onClick={() => fileRef.current.click()} style={{ width: "100%", background: PANEL2, color: MUTED, border: `1px dashed ${BORDER}`, borderRadius: 8, padding: "14px", fontSize: 13, marginTop: 4 }}>
      ＋ 上傳截圖(可一次選多張)
    </button>
    <input ref={fileRef} type="file" accept="image/*" multiple onChange={onImg} style={{ display: "none" }} />
    {f.imgs.length > 0 && (
      <div style={{ display: "flex", gap: 8, overflowX: "auto", marginTop: 8, paddingBottom: 6 }}>
        {f.imgs.map((src, i) => (
          <div key={i} style={{ position: "relative", flexShrink: 0 }}>
            <img src={src} alt={"preview" + i} style={{ height: 120, borderRadius: 8, border: `1px solid ${BORDER}` }} />
            <button onClick={() => removeImg(i)} style={{ position: "absolute", top: 4, right: 4, background: "rgba(0,0,0,0.7)", color: "#fff", borderRadius: "50%", width: 22, height: 22, fontSize: 14, lineHeight: "20px" }}>×</button>
          </div>
        ))}
      </div>
    )}
  </div>

  <button onClick={submit} style={{ background: ACCENT, color: "#000", fontWeight: 600, fontSize: 15, padding: "14px", borderRadius: 10, marginTop: 4 }}>{isEdit ? "更新交易" : "儲存交易"}</button>
  {isEdit && (
    <div style={{ display: "flex", gap: 10 }}>
      <button onClick={onCancel} style={{ flex: 1, background: PANEL2, color: TEXT, fontWeight: 600, fontSize: 14, padding: "12px", borderRadius: 10, border: `1px solid ${BORDER}` }}>取消</button>
      <button onClick={() => { if (confirm("確定刪除這筆交易?")) onDelete(editing.id); }} style={{ flex: 1, background: "transparent", color: LOSS_COLOR, fontWeight: 600, fontSize: 14, padding: "12px", borderRadius: 10, border: `1px solid ${LOSS_COLOR}` }}>刪除</button>
    </div>
  )}
</div>
```

);
}

// ============================================================
// 掛載
// ============================================================
const rootEl = document.getElementById(“root”);
if (window.__loadTimeout) clearTimeout(window.__loadTimeout);
ReactDOM.createRoot(rootEl).render(<TradeJournal />);

</script>
</body>
</html>
