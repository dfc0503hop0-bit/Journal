<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>測試2</title>
</head>
<body style="background:#0e1116;color:#e6edf3;font-family:sans-serif;">
<div id="root" style="padding:40px;">載入中…</div>

<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

<script type="text/plain" id="src">
const { useState } = React;
const { LineChart, Line, XAxis, YAxis, ResponsiveContainer } = Recharts;
const data = [{x:"A",y:10},{x:"B",y:30},{x:"C",y:20},{x:"D",y:50}];
function App() {
  const [n, setN] = useState(0);
  return (
    <div>
      <h2>✓ JSX + Recharts 正常</h2>
      <p>計數: {n}</p>
      <button onClick={() => setN(n + 1)} style={{ padding: "10px 20px", fontSize: 16 }}>點我 +1</button>
      <div style={{ width: "100%", height: 200, marginTop: 20 }}>
        <ResponsiveContainer>
          <LineChart data={data}>
            <XAxis dataKey="x" stroke="#888" />
            <YAxis stroke="#888" />
            <Line type="monotone" dataKey="y" stroke="#1fb87a" strokeWidth={2} />
          </LineChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
window.addEventListener("error", function (e) {
  document.getElementById("root").innerHTML =
    '<div style="color:#e8482b;white-space:pre-wrap;">錯誤: ' + (e.message || e) + '</div>';
});
var t = setInterval(function () {
  if (window.React && window.ReactDOM && window.Recharts && window.Babel) {
    clearInterval(t);
    try {
      var src = document.getElementById("src").textContent;
      var code = Babel.transform(src, { presets: ["react"] }).code;
      (new Function(code))();
    } catch (err) {
      document.getElementById("root").innerHTML =
        '<div style="color:#e8482b;white-space:pre-wrap;">編譯錯誤: ' + (err.message || err) + '</div>';
    }
  }
}, 100);
</script>
</body>
</html>
